services:
  faster-whisper:
    build:
      context: .
      dockerfile: faster-whisper.Dockerfile
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - WHISPER_MODEL=${WHISPER_MODEL:-base}  # Use 'base' instead of 'large-v3' for faster loading
      - WHISPER_FALLBACK_MODELS=base,tiny  # Fallback order: base -> tiny
    networks:
      - short-video-network
    volumes:
      - faster_whisper_models:/app/models
      - video_data:/app/data  # Shared volume for audio files
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    labels:
      - "coolify.managed=true"
      - "coolify.name=faster-whisper"

  piper-tts:
    build:
      context: .
      dockerfile: piper.Dockerfile
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - short-video-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    volumes:
      - piper_models:/app/models
    labels:
      - "coolify.managed=true"
      - "coolify.name=piper-tts"

  short-creator:
    build:
      context: .
      dockerfile: main.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - LANGUAGE=${LANGUAGE:-tr}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - DOCKER=true
      - DATA_DIR_PATH=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CONCURRENCY=${CONCURRENCY:-1}
      - VIDEO_CACHE_SIZE_IN_BYTES=${VIDEO_CACHE_SIZE_IN_BYTES:-2097152000}
      - PIPER_TTS_URL=http://piper-tts:5001
      - NODE_ENV=production
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "3123:3123"
    depends_on:
      piper-tts:
        condition: service_started
      faster-whisper:
        condition: service_healthy
    networks:
      - short-video-network
    volumes:
      - video_data:/app/data
      - whisper_models:/app/data/libs/whisper
    labels:
      - "coolify.managed=true"
      - "coolify.name=short-creator"
      - "coolify.port=3123"
      - "traefik.enable=true"
      - "traefik.http.routers.short-creator.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.short-creator.entrypoints=websecure"
      - "traefik.http.routers.short-creator.tls.certresolver=letsencrypt"
      - "traefik.http.services.short-creator.loadbalancer.server.port=3123"

networks:
  short-video-network:
    driver: bridge
    name: short-video-network

volumes:
  video_data:
    driver: local
    labels:
      - "coolify.managed=true"
  piper_models:
    driver: local
    labels:
      - "coolify.managed=true"
  faster_whisper_models:
    driver: local
    labels:
      - "coolify.managed=true"
  whisper_models:
    driver: local
    labels:
      - "coolify.managed=true"
